# Local development environment. Run from the repo root:
#   docker compose -f infrastructure/docker/docker-compose.yml up
#
# Credentials below are LOCAL DEVELOPMENT ONLY. Production secrets come from the secret
# manager / Vault (docs/architecture/14) — never from committed compose files.

name: lumo

networks:
  lumo:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  minio-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumo
      POSTGRES_PASSWORD: lumo
      POSTGRES_DB: lumo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumo -d lumo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lumo

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lumo

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: lumo
      CLICKHOUSE_USER: lumo
      CLICKHOUSE_PASSWORD: lumo
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lumo

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lumo

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/media local/exports local/backups
    networks:
      - lumo

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web.Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      APP_ENV: local
      LOG_LEVEL: info
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PORT: "3000"
    volumes:
      - ../..:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lumo